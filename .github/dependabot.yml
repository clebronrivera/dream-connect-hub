version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      testing:
        patterns:
          - "@testing-library/*"
          - vitest
          - jsdom
      eslint:
        patterns:
          - eslint
          - eslint-*
          - "@eslint/*"
          - typescript-eslint
      vite:
        patterns:
          - vite
          - "@vitejs/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
