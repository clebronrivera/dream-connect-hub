# Netlify build configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# Supabase anon key and URL are designed to be public (client-side). Vite inlines
# VITE_* env vars into the bundle, so the secrets scanner would otherwise fail
# the deploy. Tell Netlify not to treat these keys as secrets in build output.
[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_TURNSTILE_SITE_KEY"

# Missing /assets/* must 404 cleanly. Without this rule, the SPA fallback below
# would return index.html (HTML, 200) for missing JS chunks, and the browser
# would fail with "Importing a module script failed" instead of a clear 404.
# Static files in publish dir are served before redirects, so existing assets
# are unaffected.
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 404

# SPA fallback: serve index.html for all routes so client-side React Router works
# (backup for public/_redirects; both ensure deep links and refreshes work)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Private buyer flows — not for search indexing (page-level REP; complements <Seo noindex>)
[[headers]]
  for = "/deposit"
  [headers]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/request-deposit"
  [headers]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/payment/*"
  [headers]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/agreements/*"
  [headers]
    X-Robots-Tag = "noindex, nofollow"
